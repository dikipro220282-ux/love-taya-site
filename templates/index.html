<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Tayusha ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
}

#btn{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:10;

    border:none;

    border-radius:20px;

    background:#ff2e63;

    color:white;

    cursor:pointer;

    box-shadow:0 0 35px #ff2e63;

    transition:0.3s;

    font-weight:bold;

}

/* ПК */
@media (min-width:768px){

    #btn{
        font-size:30px;
        padding:22px 55px;
    }

}

/* Телефон */
@media (max-width:767px){

    #btn{
        font-size:20px;
        padding:16px 30px;
    }

}

#btn:hover{
    transform:translate(-50%,-50%) scale(1.08);
}

</style>
</head>
<body>

<button id="btn">Press Button ❤️</button>

<canvas id="canvas"></canvas>

<!-- МУЗЫКА -->
<audio id="music" loop>
    <source src="/static/angel.mp3" type="audio/mpeg">
</audio>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

}

resize();

window.addEventListener("resize", resize);

const btn = document.getElementById("btn");

let particles = [];
let started = false;

function heartShape(t){

    const x = 16 * Math.pow(Math.sin(t),3);

    const y =
        13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

    return {x,y};

}

btn.addEventListener("click", () => {

    // музыка
    const music = document.getElementById("music");

    music.volume = 0.7;

    music.currentTime = 0;

    music.play();

    btn.style.display = "none";

    started = true;

    particles = [];

    // LOVE дальше друг от друга
    const total = window.innerWidth < 768 ? 170 : 230;

    for(let i = 0; i < total; i++){

        const t = (i / total) * Math.PI * 2;

        const heart = heartShape(t);

        particles.push({

            tx: heart.x,
            ty: heart.y,

            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,

            speed: Math.random() * 0.025 + 0.01,

            angle: Math.random() * Math.PI * 2,

            rotate: Math.random() * 0.03

        });

    }

});

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(started){

        // БОЛЬШОЕ сердце
        const scale =
            Math.min(canvas.width, canvas.height) / 42;

        particles.forEach(p => {

            p.angle += p.rotate;

            const targetX =
                canvas.width / 2 +
                p.tx * scale;

            const targetY =
                canvas.height / 2 -
                p.ty * scale;

            p.x += (targetX - p.x) * p.speed;
            p.y += (targetY - p.y) * p.speed;

            // LOVE двигаются
            const offsetX = Math.cos(p.angle) * 7;
            const offsetY = Math.sin(p.angle) * 7;

            // LOVE размеры
            ctx.font =
                window.innerWidth < 768
                ? "12px Arial"
                : "16px Arial";

            ctx.fillStyle = "#ff4d88";

            ctx.shadowColor = "#ff4d88";
            ctx.shadowBlur = 20;

            ctx.fillText(
                "LOVE",
                p.x + offsetX,
                p.y + offsetY
            );

        });

        // Текст в центре
        ctx.textAlign = "center";

        ctx.font =
            window.innerWidth < 768
            ? "bold 42px Arial"
            : "bold 80px Arial";

        ctx.fillStyle = "white";

        ctx.shadowColor = "#ff2e63";
        ctx.shadowBlur = 40;

        ctx.fillText(
            "Tayusha",
            canvas.width / 2,
            canvas.height / 2 + 18
        );

    }

    requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
