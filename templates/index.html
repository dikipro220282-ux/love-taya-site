<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Sonya❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{

    width:100%;
    height:100%;

    overflow:hidden;

    background:black;

    font-family:Arial,sans-serif;

}

canvas{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

}

/* INTRO */

#intro{

    position:fixed;

    inset:0;

    background:black;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    z-index:100;

}

.topText{

    font-size:24px;

    color:#ff4d88;

    text-shadow:0 0 20px #ff4d88;

    letter-spacing:5px;

    margin-bottom:15px;

    animation:flicker 1.5s infinite;

    text-align:center;

}

.subText{

    font-size:15px;

    color:white;

    letter-spacing:3px;

    opacity:0.8;

    text-shadow:0 0 12px white;

    margin-bottom:35px;

    text-align:center;

}

#percent{

    font-size:60px;

    color:white;

    font-weight:bold;

    text-shadow:0 0 30px white;

    margin-bottom:20px;

}

#ready{

    display:none;

    color:#ff4d88;

    letter-spacing:5px;

    text-shadow:0 0 20px #ff4d88;

    animation:flicker 1.2s infinite;

}

@keyframes flicker{

    0%{
        opacity:1;
    }

    50%{
        opacity:0.6;
    }

    100%{
        opacity:1;
    }

}

/* BUTTON */

#btn{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:10;

    overflow:hidden;

    border:none;

    border-radius:18px;

    background:rgba(255,46,99,0.15);

    backdrop-filter:blur(10px);

    color:white;

    cursor:pointer;

    box-shadow:
        0 0 20px #ff2e63,
        0 0 40px rgba(255,46,99,0.5);

    transition:0.35s;

    font-weight:bold;

    display:none;

    letter-spacing:3px;

    border:1px solid rgba(255,255,255,0.2);

}

#btn:hover{

    transform:translate(-50%,-50%) scale(1.08);

    box-shadow:
        0 0 30px #ff2e63,
        0 0 70px rgba(255,46,99,0.8);

}

.glow{

    position:absolute;

    inset:-40px;

    background:linear-gradient(
        45deg,
        transparent,
        rgba(255,255,255,0.2),
        transparent
    );

    animation:moveGlow 3s linear infinite;

}

@keyframes moveGlow{

    0%{
        transform:translateX(-100%);
    }

    100%{
        transform:translateX(100%);
    }

}

/* PC */

@media (min-width:768px){

    #btn{
        font-size:24px;
        padding:22px 55px;
    }

}

/* MOBILE */

@media (max-width:767px){

    .topText{
        font-size:16px;
    }

    .subText{
        font-size:11px;
    }

    #percent{
        font-size:42px;
    }

    #btn{
        font-size:15px;
        padding:18px 28px;
    }

}

</style>
</head>
<body>

<!-- INTRO -->

<div id="intro">

    <div class="topText">
        ACCESSING EMOTIONAL CORE...
    </div>

    <div class="subText">
        TARGET DETECTED: frendship.exe
    </div>

    <div id="percent">
        0%
    </div>

    <div id="ready">
        LOVE SYSTEM READY
    </div>

</div>

<!-- BUTTON -->

<button id="btn">

    <span class="glow"></span>

    PRESS BUTTON KITTY ❤️

</button>

<!-- CANVAS -->

<canvas id="canvas"></canvas>

<!-- MUSIC -->

<audio id="music" loop>
    <source src="/static/angel.mp3" type="audio/mpeg">
</audio>

<script>

/* INTRO */

const intro = document.getElementById("intro");
const percent = document.getElementById("percent");
const ready = document.getElementById("ready");
const btn = document.getElementById("btn");

let load = 0;

const loading = setInterval(() => {

    load++;

    percent.innerText = load + "%";

    if(load >= 100){

        clearInterval(loading);

        ready.style.display = "block";

        setTimeout(() => {

            intro.style.display = "none";

            btn.style.display = "block";

        },1200);

    }

},35);

/* CANVAS */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

}

resize();

window.addEventListener("resize", resize);

let particles = [];
let started = false;

function heartShape(t){

    const x = 16 * Math.pow(Math.sin(t),3);

    const y =
        13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

    return {x,y};

}

/* BUTTON */

btn.addEventListener("click", () => {

    const music = document.getElementById("music");

    music.volume = 0.7;

    music.currentTime = 0;

    music.play();

    btn.style.display = "none";

    started = true;

    particles = [];

    const total = window.innerWidth < 768 ? 170 : 260;

    for(let i = 0; i < total; i++){

        const t = (i / total) * Math.PI * 2;

        const heart = heartShape(t);

        particles.push({

            baseX: heart.x,
            baseY: heart.y,

            angle: Math.random() * Math.PI * 2,

            rotateSpeed:
                Math.random() * 0.015 + 0.01

        });

    }

});

/* ANIMATION */

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(started){

        const scale =
            Math.min(canvas.width, canvas.height) / 42;

        particles.forEach(p => {

            p.angle += p.rotateSpeed;

            /* движение слов */

            const orbitX =
                Math.cos(p.angle) * 10;

            const orbitY =
                Math.sin(p.angle) * 10;

            const x =
                canvas.width / 2 +
                p.baseX * scale +
                orbitX;

            const y =
                canvas.height / 2 -
                p.baseY * scale +
                orbitY;

            ctx.font =
                window.innerWidth < 768
                ? "13px Arial"
                : "18px Arial";

            ctx.fillStyle = "#ff4d88";

            ctx.shadowColor = "#ff4d88";
            ctx.shadowBlur = 20;

            ctx.fillText(
                "I LOVE U",
                x,
                y
            );

        });

        /* CENTER TEXT */

        ctx.textAlign = "center";

        ctx.font =
            window.innerWidth < 768
            ? "bold 48px Arial"
            : "bold 90px Arial";

        ctx.fillStyle = "white";

        ctx.shadowColor = "#ff2e63";
        ctx.shadowBlur = 40;

        ctx.fillText(
            "sonya ❤️",
            canvas.width / 2,
            canvas.height / 2 + 20
        );

    }

    requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
