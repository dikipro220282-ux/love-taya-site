<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Тая ❤️</title>

<style>

body{
    margin:0;
    overflow:hidden;
    background:black;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

canvas{
    position:absolute;
    top:0;
    left:0;
}

button{
    position:absolute;
    z-index:10;
    padding:20px 40px;
    border:none;
    border-radius:20px;
    background:#ff2e63;
    color:white;
    font-size:30px;
    cursor:pointer;
    box-shadow:0 0 25px #ff2e63;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}

</style>
</head>
<body>

<button id="startBtn">Нажми ❤️</button>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const button = document.getElementById("startBtn");

let particles = [];
let started = false;

function heartFunction(t){

    const x = 16 * Math.pow(Math.sin(t), 3);

    const y =
        13 * Math.cos(t)
        - 5 * Math.cos(2 * t)
        - 2 * Math.cos(3 * t)
        - Math.cos(4 * t);

    return {
        x: x,
        y: y
    };
}

button.addEventListener("click", () => {

    button.style.display = "none";

    started = true;

    for(let i = 0; i < 1500; i++){

        const t = Math.random() * Math.PI * 2;

        const heart = heartFunction(t);

        particles.push({

            targetX: canvas.width / 2 + heart.x * 25,

            targetY: canvas.height / 2 - heart.y * 25,

            x: Math.random() * canvas.width,

            y: Math.random() * canvas.height,

            size: Math.random() * 2 + 1,

            speed: Math.random() * 0.02 + 0.01

        });
    }

});

function animate(){

    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(started){

        particles.forEach((p) => {

            p.x += (p.targetX - p.x) * p.speed;
            p.y += (p.targetY - p.y) * p.speed;

            ctx.font = "14px Arial";

            ctx.fillStyle = "#ff4d88";

            ctx.shadowColor = "#ff4d88";
            ctx.shadowBlur = 15;

            ctx.fillText("LOVE", p.x, p.y);

        });

        ctx.font = "bold 70px Arial";

        ctx.fillStyle = "white";

        ctx.shadowColor = "#ff4d88";
        ctx.shadowBlur = 40;

        ctx.fillText(
            "Тая",
            canvas.width / 2 - 90,
            canvas.height / 2 + 20
        );
    }

    requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
