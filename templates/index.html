<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Taya ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    width:100vw;
    height:100vh;
    font-family:Arial, sans-serif;
}

canvas{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
}

#btn{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    z-index:10;

    padding:22px 55px;

    border:none;
    border-radius:20px;

    background:#ff2e63;
    color:white;

    font-size:30px;
    cursor:pointer;

    box-shadow:0 0 35px #ff2e63;

    transition:0.3s;
}

#btn:hover{
    transform:translate(-50%, -50%) scale(1.1);
}

</style>
</head>
<body>

<button id="btn">Press Button ❤️</button>

<canvas id="canvas"></canvas>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

}

resize();

window.addEventListener("resize", resize);

const btn = document.getElementById("btn");

let particles = [];
let started = false;

function heartShape(t){

    const x = 16 * Math.pow(Math.sin(t),3);

    const y =
        13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

    return {x,y};
}

btn.addEventListener("click", () => {

    btn.style.display = "none";

    started = true;

    particles = [];

    for(let i = 0; i < 900; i++){

        const t = Math.random() * Math.PI * 2;

        const heart = heartShape(t);

        particles.push({

            tx: canvas.width/2 + heart.x * 35,

            ty: canvas.height/2 - heart.y * 35,

            x: Math.random() * canvas.width,

            y: Math.random() * canvas.height,

            angle: Math.random() * Math.PI * 2,

            speed: Math.random() * 0.025 + 0.01,

            rotateSpeed: Math.random() * 0.03

        });

    }

});

function animate(){

    ctx.fillStyle = "rgba(0,0,0,0.15)";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(started){

        particles.forEach(p => {

            p.angle += p.rotateSpeed;

            p.x += (p.tx - p.x) * p.speed;
            p.y += (p.ty - p.y) * p.speed;

            const offsetX = Math.cos(p.angle) * 6;
            const offsetY = Math.sin(p.angle) * 6;

            ctx.font = "20px Arial";

            ctx.fillStyle = "#ff4d88";

            ctx.shadowColor = "#ff4d88";
            ctx.shadowBlur = 20;

            ctx.fillText(
                "LOVE",
                p.x + offsetX,
                p.y + offsetY
            );

        });

        ctx.font = "bold 95px Arial";

        ctx.fillStyle = "white";

        ctx.shadowColor = "#ff2e63";
        ctx.shadowBlur = 45;

        ctx.fillText(
            "Taya",
            canvas.width / 2 - 120,
            canvas.height / 2 + 25
        );

    }

    requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
