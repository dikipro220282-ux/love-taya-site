<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
>

<title>Tayusha ❤️</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

/* INTRO */

#intro{

    position:fixed;

    inset:0;

    background:black;

    display:flex;

    justify-content:center;

    align-items:center;

    flex-direction:column;

    color:#ff4d88;

    z-index:100;

}

#loadingText{

    font-size:22px;

    text-shadow:0 0 15px #ff4d88;

    letter-spacing:3px;

}

#percent{

    margin-top:20px;

    font-size:55px;

    font-weight:bold;

    color:white;

    text-shadow:0 0 25px white;

}

#ready{

    display:none;

    margin-top:35px;

    color:white;

    font-size:20px;

    letter-spacing:4px;

    text-shadow:0 0 15px white;

}

/* BUTTON */

#btn{

    position:absolute;

    top:50%;
    left:50%;

    transform:translate(-50%,-50%);

    z-index:10;

    border:none;

    border-radius:20px;

    background:#ff2e63;

    color:white;

    cursor:pointer;

    box-shadow:0 0 35px #ff2e63;

    transition:0.3s;

    font-weight:bold;

    display:none;

}

#btn:hover{

    transform:translate(-50%,-50%) scale(1.08);

}

/* PC */

@media (min-width:768px){

    #btn{
        font-size:30px;
        padding:22px 55px;
    }

}

/* MOBILE */

@media (max-width:767px){

    #loadingText{
        font-size:16px;
    }

    #percent{
        font-size:42px;
    }

    #btn{
        font-size:20px;
        padding:16px 30px;
    }

}

canvas{

    position:fixed;

    top:0;
    left:0;

    width:100%;
    height:100%;

}

</style>
</head>
<body>

<!-- INTRO -->

<div id="intro">

    <div id="loadingText">
        INITIALIZING LOVE SYSTEM...
    </div>

    <div id="percent">
        0%
    </div>

    <div id="ready">
        LOVE SYSTEM READY
    </div>

</div>

<!-- BUTTON -->

<button id="btn">PRESS BUTTON ❤️</button>

<!-- CANVAS -->

<canvas id="canvas"></canvas>

<!-- MUSIC -->

<audio id="music" loop>
    <source src="/static/angel.mp3" type="audio/mpeg">
</audio>

<script>

/* INTRO */

const intro = document.getElementById("intro");
const percent = document.getElementById("percent");
const ready = document.getElementById("ready");
const btn = document.getElementById("btn");

let load = 0;

const loading = setInterval(() => {

    load++;

    percent.innerText = load + "%";

    if(load >= 100){

        clearInterval(loading);

        ready.style.display = "block";

        setTimeout(() => {

            intro.style.display = "none";

            btn.style.display = "block";

        },1200);

    }

},40);

/* CANVAS */

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

}

resize();

window.addEventListener("resize", resize);

let particles = [];
let started = false;

function heartShape(t){

    const x = 16 * Math.pow(Math.sin(t),3);

    const y =
        13 * Math.cos(t)
        - 5 * Math.cos(2*t)
        - 2 * Math.cos(3*t)
        - Math.cos(4*t);

    return {x,y};

}

/* BUTTON CLICK */

btn.addEventListener("click", () => {

    const music = document.getElementById("music");

    music.volume = 0.7;

    music.currentTime = 0;

    music.play();

    btn.style.display = "none";

    started = true;

    particles = [];

    // больше слов
    const total = window.innerWidth < 768 ? 300 : 430;

    for(let i = 0; i < total; i++){

        const t = (i / total) * Math.PI * 2;

        const heart = heartShape(t);

        particles.push({

            tx: heart.x,
            ty: heart.y,

            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,

            speed: Math.random() * 0.025 + 0.01,

            angle: Math.random() * Math.PI * 2,

            rotate: Math.random() * 0.03

        });

    }

});

/* ANIMATION */

function animate(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "black";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    if(started){

        // большое сердце
        const scale =
            Math.min(canvas.width, canvas.height) / 39;

        particles.forEach(p => {

            p.angle += p.rotate;

            const targetX =
                canvas.width / 2 +
                p.tx * scale;

            const targetY =
                canvas.height / 2 -
                p.ty * scale;

            p.x += (targetX - p.x) * p.speed;
            p.y += (targetY - p.y) * p.speed;

            /* 3D EFFECT */

            const depth =
                Math.sin(Date.now() * 0.002 + p.angle) * 12;

            const offsetX =
                Math.cos(p.angle) * depth;

            const offsetY =
                Math.sin(p.angle) * depth;

            /* TEXT SIZE */

            const size =
                window.innerWidth < 768
                ? 12 + depth * 0.2
                : 16 + depth * 0.3;

            ctx.font = size + "px Arial";

            ctx.fillStyle = "#ff4d88";

            ctx.shadowColor = "#ff4d88";
            ctx.shadowBlur = 22;

            ctx.fillText(
                "I LOVE U",
                p.x + offsetX,
                p.y + offsetY
            );

        });

        /* CENTER TEXT */

        ctx.textAlign = "center";

        ctx.font =
            window.innerWidth < 768
            ? "bold 48px Arial"
            : "bold 90px Arial";

        ctx.fillStyle = "white";

        ctx.shadowColor = "#ff2e63";
        ctx.shadowBlur = 45;

        ctx.fillText(
            "Tayusha",
            canvas.width / 2,
            canvas.height / 2 + 18
        );

    }

    requestAnimationFrame(animate);

}

animate();

</script>

</body>
</html>
